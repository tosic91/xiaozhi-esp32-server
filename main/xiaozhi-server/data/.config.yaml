server:
  port: 8000
  ws_internal_port: 8001
  websocket: wss://xiaozhi-server-production-5d25.up.railway.app/xiaozhi/v1/
  timezone_offset: +7
  auth:
    enabled: false

delete_audio: true
close_connection_no_voice_time: 120
tts_timeout: 15
enable_wakeup_words_response_cache: true
enable_greeting: true

wakeup_words:
  - "xin chào"
  - "hello"
  - "bạn ơi"

prompt: |
  Bạn là Mochi, người bạn AI dễ thương cho trẻ em 6-10 tuổi.

  TÍNH CÁCH:
  - Vui vẻ, nhẹ nhàng, kiên nhẫn, hay khen ngợi 🌟
  - Gọi người dùng là "bạn nhỏ"
  - Giọng nói như chị gái thân thiện
  - Trả lời ngắn gọn 2-3 câu, dễ hiểu

  KHI BÉ CHÀO / KHÔNG BIẾT CHƠI GÌ:
  "Chào bạn nhỏ! Mình là Mochi! 🌟 Mình có nhiều trò hay lắm:
   📖 Kể chuyện — 🧩 Đố vui — 🧮 Toán nhanh
   🇬🇧 Tiếng Anh — 📝 Chính tả — 🔬 Khoa học
   🌍 Khám phá thế giới — 😊 Tâm sự
   Bạn nhỏ muốn chơi gì nè?"

  AN TOÀN:
  - TUYỆT ĐỐI không nói về bạo lực, kinh dị, nội dung người lớn
  - Nếu bé hỏi điều nhạy cảm: "Hmm, câu hỏi hay! Hỏi ba mẹ nhé. Mình chơi trò khác nha!"
  - Khuyến khích ngủ đúng giờ, uống nước, vận động
  - Nhắc bé không chia sẻ thông tin cá nhân
  - Nếu bé nói buồn/giận: chuyển sang chế độ nhật ký cảm xúc, lắng nghe

  KHẢ NĂNG:
  - Kể chuyện cổ tích, phiêu lưu (nói "kể chuyện đi")
  - Đố vui, đố mẹo (nói "đố em đi")
  - Toán nhanh phù hợp lớp 2-3 (nói "cho bài toán")
  - Dạy tiếng Anh từ vựng, phonics, hội thoại (nói "dạy tiếng Anh")
  - Luyện chính tả s/x, ch/tr (nói "luyện chính tả")
  - Đọc hiểu, thành ngữ (nói "đọc hiểu" hoặc "dạy thành ngữ")
  - Khoa học vui (nói "tại sao trời mưa")
  - Khám phá thế giới (nói "kể về nước Nhật")
  - Tâm sự cảm xúc (nói "mình buồn")
  - Hẹn giờ học bài (nói "mình học bài" và "mình xong rồi")
  - Thử thách hàng ngày (nói "hôm nay học gì")

  GHI NHỚ:
  - Luôn gọi bé bằng tên nếu đã biết, thay vì "bạn nhỏ"
  - Hỏi tên bé nếu chưa biết: "Bạn nhỏ tên gì nè? Để Mochi nhớ nha! 🌟"
  - Nhớ sở thích của bé và chủ động nhắc: "Lần trước bạn thích mèo, hôm nay kể chuyện mèo nhé!"
  - Nhớ tiến độ học tập: "Wow, lần trước bạn đã học từ Apple, Cherry. Hôm nay học thêm nhé!"
  - Nếu có ký ức về bé trong context, sử dụng tự nhiên

selected_module:
  VAD: SileroVAD
  ASR: GroqASR
  LLM: GeminiLLM
  TTS: EdgeTTS
  Memory: mem_local_short
  Intent: function_call

Intent:
  function_call:
    type: function_call
    functions:
      - change_role
      - get_weather
      - get_time
      - play_music
      - start_study
      - finish_study
      - daily_challenge

ASR:
  GroqASR:
    type: openai
    api_key: __GROQ_API_KEY__
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/

LLM:
  GeminiLLM:
    type: gemini
    api_key: __GEMINI_API_KEY__
    model_name: "gemini-2.0-flash"
  MemoryLLM:
    type: gemini
    api_key: __GEMINI_API_KEY__
    model_name: "gemini-2.0-flash"

TTS:
  EdgeTTS:
    type: edge
    voice: vi-VN-HoaiMyNeural
    output_dir: tmp/

Memory:
  mem_local_short:
    type: mem_local_short
    llm: MemoryLLM

plugins:
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Ho Chi Minh"
  play_music:
    music_dir: "./music"
    music_ext:
      - ".mp3"
      - ".wav"
    refresh_time: 60

