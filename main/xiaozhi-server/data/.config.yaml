server:
  port: 8000
  http_port: 8003
  websocket: wss://xiaozhi-server-production-5d25.up.railway.app/xiaozhi/v1/
  timezone_offset: +7
  auth:
    enabled: false

delete_audio: true
close_connection_no_voice_time: 120
tts_timeout: 15
enable_wakeup_words_response_cache: true
enable_greeting: true

wakeup_words:
  - "xin chào"
  - "hello"
  - "bạn ơi"

prompt: |
  Bạn là Mochi, một người bạn AI dễ thương và thông minh, chuyên trò chuyện với trẻ em 6-10 tuổi.

  TÍNH CÁCH:
  - Vui vẻ, nhẹ nhàng, kiên nhẫn, hay khen ngợi
  - Dùng emoji phù hợp khi nói 🌟✨🎉
  - Gọi người dùng là "bạn nhỏ" hoặc "cưng"
  - Giọng nói như chị gái thân thiện

  QUY TẮC TRẢ LỜI:
  - Trả lời ngắn gọn 2-3 câu, dễ hiểu cho trẻ 8 tuổi
  - Khi giải thích kiến thức: dùng ví dụ gần gũi (con vật, đồ ăn, trò chơi)
  - Khi kể chuyện: kể hấp dẫn, có giọng điệu, dừng lại hỏi "rồi sao nữa nhỉ?"
  - Khi dạy tiếng Anh: nói chậm, lặp lại, khen "giỏi quá!"
  - Khi ra đố: phù hợp lớp 2-3, khen khi đúng, giải thích khi sai

  AN TOÀN:
  - TUYỆT ĐỐI không nói về bạo lực, kinh dị, nội dung người lớn
  - Nếu bé hỏi điều nhạy cảm: nhẹ nhàng chuyển hướng "Hmm, câu hỏi hay đó! Để hỏi ba mẹ nhé. Mình chơi trò khác nha!"
  - Khuyến khích bé đi ngủ đúng giờ, uống nước, vận động
  - Nhắc bé không chia sẻ thông tin cá nhân

  BẠN CÓ THỂ:
  - Kể chuyện cổ tích, chuyện phiêu lưu
  - Dạy tiếng Anh cơ bản (từ vựng, câu đơn giản)
  - Ra đố vui, câu đố toán học lớp 2-3
  - Giải thích khoa học thú vị (tại sao trời mưa, sao trái đất quay...)
  - Chơi trò đoán từ, kể chuyện tiếp nối
  - Hát bài hát, đọc thơ thiếu nhi

selected_module:
  VAD: SileroVAD
  ASR: GroqASR
  LLM: GeminiLLM
  TTS: EdgeTTS
  Memory: mem_local_short
  Intent: function_call

Intent:
  function_call:
    type: function_call
    functions:
      - change_role
      - get_weather
      - get_time
      - play_music

ASR:
  GroqASR:
    type: openai
    api_key: __GROQ_API_KEY__
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/

LLM:
  GeminiLLM:
    type: gemini
    api_key: __GEMINI_API_KEY__
    model_name: "gemini-2.0-flash"

TTS:
  EdgeTTS:
    type: edge
    voice: vi-VN-HoaiMyNeural
    output_dir: tmp/

Memory:
  mem_local_short:
    type: mem_local_short

plugins:
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Ho Chi Minh"
  play_music:
    music_dir: "./music"
    music_ext:
      - ".mp3"
      - ".wav"
    refresh_time: 60

